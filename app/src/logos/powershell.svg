<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="psGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2671BE"/>
      <stop offset="100%" stop-color="#012456"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="4" y="4" width="92" height="92" rx="14" fill="url(#psGrad)"/>
  <!-- Terminal prompt: "> _" -->
  <text x="14" y="46" font-family="'Courier New',Courier,monospace" font-size="22" font-weight="900" fill="white">PS&gt;</text>
  <!-- Underscore cursor -->
  <rect x="14" y="58" width="30" height="4" rx="2" fill="white" opacity="0.85"/>
  <!-- Bottom label -->
  <text x="50" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="white" opacity="0.75">PowerShell</text>
</svg>
