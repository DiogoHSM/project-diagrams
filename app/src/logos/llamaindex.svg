<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- LlamaIndex brand: purple gradient + llama silhouette -->
  <defs>
    <linearGradient id="liGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="18" fill="url(#liGrad)"/>
  <!-- Simple llama silhouette (head + neck + body) -->
  <!-- Body -->
  <ellipse cx="58" cy="80" rx="26" ry="20" fill="white" opacity="0.92"/>
  <!-- Neck -->
  <rect x="54" y="48" width="14" height="30" rx="7" fill="white" opacity="0.92"/>
  <!-- Head -->
  <ellipse cx="61" cy="42" rx="13" ry="11" fill="white" opacity="0.92"/>
  <!-- Ear left -->
  <ellipse cx="53" cy="33" rx="4" ry="7" fill="white" opacity="0.92" transform="rotate(-10 53 33)"/>
  <!-- Ear right -->
  <ellipse cx="70" cy="32" rx="4" ry="7" fill="white" opacity="0.92" transform="rotate(10 70 32)"/>
  <!-- Eye -->
  <circle cx="65" cy="41" r="2.5" fill="#4F46E5"/>
  <!-- Legs -->
  <rect x="38" y="92" width="8" height="18" rx="4" fill="white" opacity="0.85"/>
  <rect x="50" y="92" width="8" height="18" rx="4" fill="white" opacity="0.85"/>
  <rect x="62" y="92" width="8" height="18" rx="4" fill="white" opacity="0.85"/>
  <rect x="74" y="92" width="8" height="18" rx="4" fill="white" opacity="0.85"/>
</svg>
